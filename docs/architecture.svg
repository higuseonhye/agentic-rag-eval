<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820">
  <style>
    .bg { fill: #ffffff; }
    .box { fill: #ffffff; stroke: #d4d4d8; stroke-width: 2; rx: 14; }
    .title { font: 600 22px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #09090b; }
    .label { font: 600 14px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #09090b; }
    .small { font: 500 12px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #52525b; }
    .arrow { stroke: #71717a; stroke-width: 2.5; fill: none; marker-end: url(#arrowHead); }
    .group { fill: #fafafa; stroke: #e4e4e7; stroke-width: 2; rx: 18; }
  </style>

  <defs>
    <marker id="arrowHead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#71717a"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1400" height="820"/>
  <text class="title" x="40" y="48">ADW Platform Architecture (MVP ’ Knowledge OS)</text>

  <!-- Core routing -->
  <rect class="box" x="40" y="90" width="250" height="70"/>
  <text class="label" x="60" y="125">UserRequest</text>
  <text class="small" x="60" y="148">Query / task / document workflow</text>

  <rect class="box" x="340" y="90" width="300" height="70"/>
  <text class="label" x="360" y="125">AdaptiveRouter (L0L4)</text>
  <text class="small" x="360" y="148">Budgets + strategy selection</text>

  <path class="arrow" d="M 290 125 L 340 125"/>

  <!-- Route outputs -->
  <rect class="box" x="720" y="70" width="300" height="62"/>
  <text class="label" x="740" y="105">L0: DirectResponse</text>
  <text class="small" x="740" y="125">No retrieval</text>

  <rect class="box" x="720" y="150" width="300" height="62"/>
  <text class="label" x="740" y="185">L1: DenseRetrieval</text>
  <text class="small" x="740" y="205">VectorStore only</text>

  <rect class="box" x="720" y="230" width="300" height="62"/>
  <text class="label" x="740" y="265">L2: HybridRetrieval + Rerank</text>
  <text class="small" x="740" y="285">Sparse + dense fusion</text>

  <rect class="box" x="720" y="310" width="300" height="62"/>
  <text class="label" x="740" y="345">L3: AgenticRAG</text>
  <text class="small" x="740" y="365">Iterative retrieve + reflect</text>

  <rect class="box" x="720" y="390" width="300" height="62"/>
  <text class="label" x="740" y="425">L4: ADW Orchestrator</text>
  <text class="small" x="740" y="445">Stateful workflow execution</text>

  <path class="arrow" d="M 640 125 C 680 125, 680 100, 720 100"/>
  <path class="arrow" d="M 640 125 C 680 125, 680 180, 720 180"/>
  <path class="arrow" d="M 640 125 C 680 125, 680 260, 720 260"/>
  <path class="arrow" d="M 640 125 C 680 125, 680 340, 720 340"/>
  <path class="arrow" d="M 640 125 C 680 125, 680 420, 720 420"/>

  <!-- Knowledge engine group -->
  <rect class="group" x="40" y="210" width="600" height="300"/>
  <text class="label" x="60" y="245">KnowledgeEngine (ingestion + indexing)</text>
  <text class="small" x="60" y="266">chunk ’ sparse + dense ’ entities ’ graph</text>

  <rect class="box" x="70" y="290" width="240" height="64"/>
  <text class="label" x="90" y="325">Chunk + Metadata</text>
  <text class="small" x="90" y="345">Parsing, chunking strategy</text>

  <rect class="box" x="340" y="290" width="270" height="64"/>
  <text class="label" x="360" y="325">SparseIndex (Postgres FTS)</text>
  <text class="small" x="360" y="345">Lexical / exact match</text>

  <rect class="box" x="340" y="370" width="270" height="64"/>
  <text class="label" x="360" y="405">VectorIndex (VectorStore)</text>
  <text class="small" x="360" y="425">Qdrant (default) / Chroma</text>

  <rect class="box" x="70" y="370" width="240" height="64"/>
  <text class="label" x="90" y="405">EntityExtraction</text>
  <text class="small" x="90" y="425">Heuristic now, LLM later</text>

  <rect class="box" x="70" y="450" width="540" height="48"/>
  <text class="label" x="90" y="480">GraphIndex (Neo4j EntityGraph)</text>

  <path class="arrow" d="M 310 322 L 340 322"/>
  <path class="arrow" d="M 310 402 L 340 402"/>
  <path class="arrow" d="M 190 354 L 190 370"/>
  <path class="arrow" d="M 190 434 L 190 450"/>

  <!-- Observability + state -->
  <rect class="group" x="1060" y="150" width="300" height="302"/>
  <text class="label" x="1080" y="185">Observability + Evaluation</text>
  <text class="small" x="1080" y="206">trace, metrics, replay (MVP)</text>

  <rect class="box" x="1090" y="230" width="240" height="70"/>
  <text class="label" x="1110" y="265">TraceRun + AgentStep</text>
  <text class="small" x="1110" y="288">Process-level tracing</text>

  <rect class="box" x="1090" y="320" width="240" height="70"/>
  <text class="label" x="1110" y="355">EvaluationResult</text>
  <text class="small" x="1110" y="378">Process metrics + judges</text>

  <path class="arrow" d="M 1020 340 L 1060 340"/>

  <rect class="group" x="1060" y="470" width="300" height="170"/>
  <text class="label" x="1080" y="505">State + Memory</text>
  <text class="small" x="1080" y="526">resumability + experience</text>

  <rect class="box" x="1090" y="550" width="240" height="70"/>
  <text class="label" x="1110" y="585">WorkflowStateStore</text>
  <text class="small" x="1110" y="608">Postgres snapshots</text>

  <path class="arrow" d="M 1020 420 L 1060 585"/>

  <!-- Link strategy boxes to indexes -->
  <path class="arrow" d="M 720 260 L 640 322"/>
  <path class="arrow" d="M 720 260 L 640 402"/>
  <path class="arrow" d="M 720 340 L 640 322"/>
  <path class="arrow" d="M 720 340 L 640 402"/>
  <path class="arrow" d="M 720 420 L 610 474"/>
</svg>

